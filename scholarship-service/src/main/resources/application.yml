spring:
  application:
    name: scholarship-service

  datasource:
    url: jdbc:postgresql://localhost:5465/scholarshipDB
    username: scholarshipteacher
    password: scholarshipteacher
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    enable:
      all: true


