spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

management:
  otlp:
    tracing:
      endpoint: ${TEMPO_ENDPOINT}
      protocol: "http/protobuf"

logging:
  level:
    root: info
    org.springframework: info
    org.hibernate: warn
    org.hibernate.SQL: warn