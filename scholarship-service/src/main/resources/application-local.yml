spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/scholarshipDB
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true


management:
  otlp:
    tracing:
      endpoint: ${TRACING_ENDPOINT}

logging:
  level:
    root: debug
    org.springframework: debug
    org.hibernate: debug
    org.hibernate.SQL: debug