spring:
  application:
    name: notification-service


server:
  port: 10002


management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health, info, loggers, metrics, prometheus
  endpoint:
    probes:
      enabled: true
    health:
      show-details: always
    prometheus:
      access: read_only
  tracing:
    sampling:
      probability: 1.0
    export:
      enabled: true


info:
  description: "Микросервис уведомалений"



