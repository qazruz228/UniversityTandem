apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-config
  namespace: {{ .Values.namespace }}
data:
  KC_DB: "postgres"
  KC_DB_URL: jdbc:postgresql://{{ .Values.keycloak.dbHost }}:{{ .Values.keycloak.dbPort }}/{{ .Values.keycloak.dbDatabase }}
  KC_DB_USERNAME: {{ .Values.keycloak.dbUsername | quote }}
  KC_DB_PASSWORD: {{ .Values.keycloak.dbPassword | quote }}
  KC_HOSTNAME_STRICT: "{{ .Values.keycloak.hostnameStrict }}"
  KC_METRICS_ENABLED: "{{ .Values.keycloak.metricsEnabled }}"