global:
  scrape_interval: 15s


rule_files:
  - 'alert.rules.yml'


scrape_configs:
  - job_name: 'headteacher-service'
    metrics_path: 'actuator/prometheus'
    static_configs:
      - targets: [ 'headteacher-service:10000' ]
  - job_name: 'teacher-service'
    metrics_path: 'actuator/prometheus'
    static_configs:
      - targets: [ 'teacher-service:10001' ]
  - job_name: 'notification-service'
    metrics_path: 'actuator/prometheus'
    static_configs:
      - targets: [ 'notification-service:10002' ]
  - job_name: 'student-service'
    metrics_path: 'actuator/prometheus'
    static_configs:
      - targets: [ 'student-service:10003' ]

