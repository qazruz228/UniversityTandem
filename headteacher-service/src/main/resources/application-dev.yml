spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://${KC_HOST}:8080/realms/tandem


  springdoc:
    swagger-ui:
      oauth:
        client-id: ${CLIENT_ID}
        client-secret: ${CLIENT_SECRET}
        scopes: openid,profile,email


  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: false

  management:
    otlp:
      tracing:
        endpoint: ${TEMPO_ENDPOINT}
        protocol: "http/protobuf"


logging:
  level:
    root: info
    org.springframework: info
    org.hibernate: info
    org.hibernate.SQL: info