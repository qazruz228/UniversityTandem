spring:
  application:
    name: headteacher-service

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    enabled: true

server:
  port: 10000

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health, info, loggers, metrics, prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
    prometheus:
      access: read_only
  tracing:
    sampling:
      probability: 1.0
    export:
      enabled: true


info:
  description: "Микросервис для Завучей"
