spring:
  application:
    name: teacher-service


  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/tandem


  kafka:
    bootstrap-servers: kafka:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 10
      properties:
        enable.idempotence: true
        delivery.timeout.ms: 12000



  datasource:
    url: jdbc:postgresql://postgres-teacher:5432/teacherDB
    username: postgresteacher
    password: postgresteacher
    driver-class-name: org.postgresql.Driver



  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true


  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    enabled: true



logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.security: DEBUG
    org.keycloak: DEBUG

server:
  port: 10001

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health, info, loggers, metrics, prometheus
  endpoint:
    probes:
      enabled: true
    health:
      show-details: always
    prometheus:
      access: read_only
  otlp:
    tracing:
      endpoint: "http://alloy:4318/v1/traces"
      protocol: "http/protobuf"
  tracing:
    sampling:
      probability: 1.0
    export:
      enabled: true


info:
  description: "Микросервис для учителей"
